<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lotto Number Generator</title>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4217713545229569"
     crossorigin="anonymous"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="lotto-machine">
        <h1>Lotto Number Generator</h1>
        <div class="numbers-container"></div>
        <button id="generate-btn">Generate Numbers</button>
        <div class="controls">
            <button id="theme-toggle">Dark Mode</button>
        </div>
    </div>

    <div class="contact-form-container">
        <h2>제휴 문의</h2>
        <form class="contact-form" action="https://formspree.io/f/mlgpgddy" method="POST">
            <div class="form-group">
                <label for="name">성함 / 담당자명</label>
                <input type="text" id="name" name="name" placeholder="홍길동" required>
            </div>
            <div class="form-group">
                <label for="email">이메일 주소</label>
                <input type="email" id="email" name="_replyto" placeholder="example@email.com" required>
            </div>
            <div class="form-group">
                <label for="company">회사명 / 서비스명</label>
                <input type="text" id="company" name="company" placeholder="회사명을 입력해주세요">
            </div>
            <div class="form-group">
                <label for="message">문의 내용</label>
                <textarea id="message" name="message" placeholder="제휴 관련 내용을 상세히 적어주세요" required></textarea>
            </div>
            <button type="submit" id="submit-btn">문의하기</button>
        </form>
    </div>

    <div id="disqus-container">
        <div id="disqus_thread"></div>
    </div>
    <script>
        var disqus_config = function () {
            this.page.url = window.location.href;  
            this.page.identifier = window.location.pathname; 
        };
        (function() { // DON'T EDIT BELOW THIS LINE
        var d = document, s = d.createElement('script');
        s.src = 'https://productbuilder-jcc9vv3apq.disqus.com/embed.js';
        s.setAttribute('data-timestamp', +new Date());
        (d.head || d.body).appendChild(s);
        })();
    </script>
    <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>
    <script src="main.js"></script>
</body>
</html>
